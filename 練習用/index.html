<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    .container {
      max-width: 700px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 48px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background-color: #4a90d9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #fff;
      margin: 0 auto 24px;
    }

    h1 {
      font-size: 28px;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 36px;
    }

    h2 {
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4a90d9;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e8f0fb;
    }

    section {
      margin-bottom: 32px;
    }

    p {
      color: #555;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .skill-tag {
      background-color: #e8f0fb;
      color: #4a90d9;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
    }

    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 8px;
    }

    .links a {
      color: #4a90d9;
      text-decoration: none;
      font-size: 14px;
      border: 1px solid #4a90d9;
      padding: 8px 20px;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
    }

    .links a:hover {
      background-color: #4a90d9;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="avatar">K</div>
      <h1>大石 江太</h1>
      <p class="subtitle">Web Developer</p>

      <section>
        <h2>About Me</h2>
        <p>東京在住のWebデベロッパーです。使いやすくシンプルなWebサイトやアプリケーションを作ることが好きです。現在はフロントエンド開発を中心に学習しています。</p>
      </section>

      <section>
        <h2>Skills</h2>
        <div class="skills">
          <span class="skill-tag">HTML</span>
          <span class="skill-tag">CSS</span>
          <span class="skill-tag">JavaScript</span>
          <span class="skill-tag">React</span>
          <span class="skill-tag">Git</span>
        </div>
      </section>

      <section>
        <h2>Contact</h2>
        <div class="links">
          <a href="mailto:example@email.com">Email</a>
          <a href="#">GitHub</a>
          <a href="#">Twitter</a>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
